server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers les microservices
    location /api/chat/ {
        proxy_pass http://chat-service:8001/;
        proxy_set_header Host $host;
    }

    location /api/memory/ {
        proxy_pass http://memory-service:8002/;
        proxy_set_header Host $host;
    }

    location /api/persona/ {
        proxy_pass http://personality-service:8003/;
        proxy_set_header Host $host;
    }

    location /api/payment/ {
        proxy_pass http://payment-service:8004/;
        proxy_set_header Host $host;
    }

    location /api/training/ {
        proxy_pass http://training-service:8005/;
        proxy_set_header Host $host;
    }
}
